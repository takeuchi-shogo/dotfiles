version: "3"

tasks:
  symlink:
    desc: Create symlinks for dotfiles
    cmds:
      - ~/dotfiles/.bin/symlink.sh

  install:
    desc: Run initial setup (Homebrew, packages, symlinks, etc.)
    cmds:
      - ~/dotfiles/.bin/init-install.sh

  brew:
    desc: Install packages from Brewfile
    cmds:
      - brew bundle --file=~/dotfiles/Brewfile

  restart-wm:
    desc: Restart window manager services (AeroSpace)
    cmds:
      - ~/dotfiles/.bin/restart-wm.sh

  update:
    desc: Update Homebrew and all packages
    cmds:
      - brew update && brew upgrade && brew cleanup

  build-hooks:
    desc: Build claude-hooks Rust binary
    dir: ~/dotfiles/tools/claude-hooks
    cmds:
      - cargo build --release
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/claude-hooks

  validate:
    desc: Run all dotfiles validation checks
    cmds:
      - task: validate-configs
      - task: validate-readmes
      - task: validate-symlinks

  validate-configs:
    desc: Validate syntax for config and script files
    cmds:
      - ~/dotfiles/.bin/validate_configs.sh

  validate-readmes:
    desc: Validate local links in README files
    cmds:
      - ~/dotfiles/.bin/validate_readmes.sh

  validate-symlinks:
    desc: Validate key symlinks managed by dotfiles
    cmds:
      - ~/dotfiles/.bin/validate_symlinks.sh
