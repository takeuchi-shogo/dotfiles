version: "3"

includes:
  osa:
    taskfile: tools/otel-session-analyzer/Taskfile.yml
    dir: tools/otel-session-analyzer

tasks:
  # Phase B2.4 (2026-04-26): symlink タスクは削除。home-manager (nix:switch) が
  # symlink を管理する。詳細は docs/plans/completed/2026-04-25-phase-b2-plan.md。
  #
  # 例外: 自己書き換えするアプリ (cmux など) は home-manager の symlink を
  # 実ディレクトリに置き換えてしまうため、明示的な復旧タスクが必要。

  cmux:link:
    desc: |
      cmux の symlink を ~/dotfiles/.config/cmux/ に貼り直す。
      cmux が symlink を実ディレクトリに置き換えた場合の復旧用。
      既存の live config は ~/.config/cmux.bak-<timestamp> にバックアップ。
    cmds:
      - |
        set -euo pipefail
        live="$HOME/.config/cmux"
        target="$HOME/dotfiles/.config/cmux"
        if [ ! -d "$target" ]; then
          echo "ERROR: target not found: $target" >&2
          exit 1
        fi
        if [ -L "$live" ]; then
          current=$(readlink "$live")
          if [ "$current" = "$target" ]; then
            echo "✅ Already a symlink: $live → $current"
            exit 0
          fi
          echo "Replacing existing symlink: $live → $current"
          rm "$live"
        elif [ -d "$live" ]; then
          ts=$(date +%Y%m%d-%H%M%S)
          backup="$HOME/.config/cmux.bak-$ts"
          echo "Backing up live config: $live → $backup"
          mv "$live" "$backup"
        elif [ -e "$live" ]; then
          echo "ERROR: $live exists and is neither a symlink nor a directory" >&2
          exit 1
        fi
        ln -s "$target" "$live"
        echo "✅ Created symlink: $live → $(readlink "$live")"
        echo ""
        echo "Next: reload cmux config (cmd+shift+, in cmux) or restart cmux."

  install:
    desc: Run initial bootstrap setup (legacy, pre-nix). For nix-managed setup use nix:bootstrap.
    cmds:
      - ~/dotfiles/.bin/init-install.sh

  setup:
    desc: |
      Post-clone / post-nix:switch orchestration. Idempotent — safe to re-run.
      Pre-req: `task nix:bootstrap PROFILE=...` (first machine) or `task nix:switch PROFILE=...`.
      Chains the steps that are NOT covered by nix-darwin / init-install.sh:
        build-hooks → lefthook:install → build-claude → patch-claude → claude:plugins → doctor
      Skills are vendored in the repo (symlinked by nix), so nix:switch already
      provides them; claude:plugins fetches the plugin payloads that are machine-local.
      Excluded (run manually if needed): cmux:link, cmux:worktree-daemon:install.
    cmds:
      - task: build-hooks
      - task: lefthook:install
      - task: build-claude
      - task: patch-claude
      - task: claude:plugins
      - task: doctor

  brew:
    desc: Install packages from Brewfile
    cmds:
      - brew bundle --file=~/dotfiles/Brewfile

  brew:install:
    desc: Alias for `task brew` (kept for spec/playbook compatibility — see docs/specs/2026-05-20-work-mac-validation.md)
    cmds:
      - task: brew

  lefthook:install:
    desc: Install lefthook git hooks (pre-commit + commit-msg) from lefthook.yml. Required after fresh clone — CLAUDE.md enforces `--no-verify` ban via these hooks.
    preconditions:
      - sh: command -v lefthook >/dev/null
        msg: 'lefthook not found in PATH — install via `brew install lefthook` (or add to nix-darwin homebrew.brews)'
    cmds:
      - lefthook install

  nix:bootstrap:
    desc: 'First-time apply (darwin-rebuild not yet installed). Usage: task nix:bootstrap PROFILE=private'
    vars:
      PROFILE: '{{.PROFILE | default "private"}}'
    cmds:
      # Recent nix-darwin requires root for system activation.
      # HOME fallback warning (/var/root) is benign — nix daemon handles user profile correctly.
      - sudo nix run github:nix-darwin/nix-darwin#darwin-rebuild -- switch --flake ~/dotfiles/nix#{{.PROFILE}}

  nix:switch:
    desc: 'Apply nix-darwin configuration (after bootstrap). Usage: task nix:switch PROFILE=private'
    vars:
      PROFILE: '{{.PROFILE | default "private"}}'
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake ~/dotfiles/nix#{{.PROFILE}}

  nix:rollback:
    desc: Roll back to previous nix-darwin generation
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild --rollback

  nix:check:
    desc: Validate nix flake (evaluation + structure)
    cmds:
      - nix flake check ~/dotfiles/nix

  nix:list-generations:
    desc: List nix-darwin generations (for rollback targeting)
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild --list-generations

  nix:explain:
    desc: Dry-run Determinate Systems Installer to preview system changes
    cmds:
      - 'echo "Run this manually (requires sudo): curl -fsSL https://install.determinate.systems/nix | sh -s -- install --explain"'

  nix:snapshot:
    desc: 'Capture /etc/* shell profile snapshot (usage: task nix:snapshot PHASE=pre | task nix:snapshot PHASE=post)'
    vars:
      PHASE: '{{.PHASE | default "pre"}}'
    cmds:
      - ~/dotfiles/nix/scripts/snapshot.sh {{.PHASE}}

  restart-wm:
    desc: Restart window manager services (AeroSpace)
    cmds:
      - ~/dotfiles/.bin/restart-wm.sh

  update:
    desc: Update Homebrew and all packages
    cmds:
      - brew update && brew upgrade && brew cleanup

  build-hooks:
    desc: Build claude-hooks Rust binary
    dir: ~/dotfiles/tools/claude-hooks
    cmds:
      - cargo build --release
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/claude-hooks

  validate:
    desc: Run all dotfiles validation checks
    cmds:
      - task: validate-configs
      - task: validate-readmes
      - task: validate-symlinks

  validate-configs:
    desc: Validate syntax for config and script files
    deps:
      - validate-agents
    cmds:
      - ~/dotfiles/.bin/validate_configs.sh

  validate-agents:
    desc: Validate agent definitions (tools, permissions)
    cmds:
      - bash .config/claude/scripts/policy/validate-agents.sh

  validate-readmes:
    desc: Validate local links in README files
    cmds:
      - ~/dotfiles/.bin/validate_readmes.sh

  validate-symlinks:
    desc: Validate key symlinks managed by dotfiles
    cmds:
      - ~/dotfiles/.bin/validate_symlinks.sh

  doctor:
    desc: Run setup health check (binary/symlink/nix/hook/brew) — see docs/specs/2026-05-13-setup-doctor.md
    cmds:
      # `defer` ensures symlink validation runs even if doctor.sh exits non-zero.
      # Without it Task stops on the first FAIL and skips symlink checks — but FAIL
      # is exactly when you want the full report. (Task >= 3.36 syntax.)
      - defer: { task: validate-symlinks }
      - bash scripts/lifecycle/doctor.sh all

  doctor:binary:
    desc: Check required binaries and minimum versions
    cmds:
      - bash scripts/lifecycle/doctor.sh binary

  doctor:symlink:
    desc: Check managed symlinks (delegates to validate-symlinks)
    cmds:
      - task: validate-symlinks

  doctor:nix:
    desc: Check nix-darwin profile/hostname/darwin-rebuild
    cmds:
      - bash scripts/lifecycle/doctor.sh nix

  doctor:hook:
    desc: Statically validate settings.json hook commands (read-only, no execution)
    cmds:
      - bash scripts/lifecycle/doctor.sh hook

  doctor:brew:
    desc: Check declared brews (nix-darwin) vs installed
    cmds:
      - bash scripts/lifecycle/doctor.sh brew

  doctor:plugins:
    desc: Check Claude Code plugins declared in settings.json vs installed (delegates to claude:plugins:check)
    cmds:
      - task: claude:plugins:check

  doctor:stale:
    desc: Inventory stale state (orphaned codex job state, backup residue) — read-only, deletes nothing
    cmds:
      - bash scripts/lifecycle/doctor-stale.sh

  upgrade-claude:
    desc: Upgrade Claude Code and apply system prompt patches
    cmds:
      - npm update -g @anthropic-ai/claude-code
      - node ~/dotfiles/tools/system-prompt-patcher/patch-cli.js
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js
    preconditions:
      - test -f ~/dotfiles/tools/system-prompt-patcher/patch-cli.js

  patch-claude:
    desc: Apply system prompt patches without upgrading
    cmds:
      - node ~/dotfiles/tools/system-prompt-patcher/patch-cli.js
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js

  restore-claude:
    desc: Restore Claude Code to vanilla (unpatched) state
    cmds:
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js --restore

  list-claude:
    desc: List installed Claude Code versions and the active one
    cmds:
      - ls -1 ~/.local/share/claude/versions/
      - 'echo "active: $(basename "$(readlink ~/.local/bin/claude 2>/dev/null)")"'

  rollback-claude:
    desc: 'Switch active Claude Code to a specific version (usage: task rollback-claude -- 2.1.101)'
    cmds:
      - 'test -n "{{.CLI_ARGS}}" || (echo "usage: task rollback-claude -- <version>" && exit 1)'
      - 'test -e ~/.local/share/claude/versions/{{.CLI_ARGS}} || (echo "version {{.CLI_ARGS}} not installed under ~/.local/share/claude/versions/" && exit 1)'
      - 'ln -snf ~/.local/share/claude/versions/{{.CLI_ARGS}} ~/.local/bin/claude'
      - '~/.local/bin/claude --version'

  build-claude:
    desc: Build CLAUDE.md from template components
    cmds:
      - bash ~/.claude/scripts/lifecycle/build-claude.sh

  build-claude-check:
    desc: Check if CLAUDE.md matches templates (no write)
    cmds:
      - bash ~/.claude/scripts/lifecycle/build-claude.sh --check

  claude:plugins:
    desc: |
      Install Claude Code marketplaces + plugins declared in settings.json
      (enabledPlugins + extraKnownMarketplaces). Idempotent. Run on a fresh
      clone so user-scope plugins present on other machines are materialized.
      Skills are vendored in the repo (nix symlink) and need no install step.
    cmds:
      - bash ~/dotfiles/scripts/lifecycle/claude-plugins-sync.sh install

  claude:plugins:check:
    desc: 'Read-only: report plugins declared in settings.json but not installed (exit 1 if any missing)'
    cmds:
      - bash ~/dotfiles/scripts/lifecycle/claude-plugins-sync.sh check

  codex-janitor:
    desc: Run the repo-local Codex janitor workflow runner
    cmds:
      - python3 ~/dotfiles/tools/codex-janitor/runner.py {{.CLI_ARGS}}

  skills:drift-check:
    desc: Detect drift between skills-lock.json provenance and upstream HEAD
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-drift-check.sh {{.CLI_ARGS}}

  skills:verify:
    desc: Verify installed external skills against computedHash in skills-lock.json
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-hash-verify.sh

  skills:rollback:
    desc: 'Roll back skills-lock.json to a previous snapshot (usage: task skills:rollback -- --to=TIMESTAMP)'
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-rollback.sh {{.CLI_ARGS}}

  skills:install-gh:
    desc: 'Experimental wrapper over `gh skill install` (requires gh CLI v2.90+)'
    cmds:
      - bash ~/dotfiles/scripts/experimental/gh-skill-wrapper.sh install {{.CLI_ARGS}}

  skills:search-gh:
    desc: 'Experimental wrapper over `gh skill search` (requires gh CLI v2.90+)'
    cmds:
      - bash ~/dotfiles/scripts/experimental/gh-skill-wrapper.sh search {{.CLI_ARGS}}

  cmux:worktree-daemon:install:
    desc: 'Install cmux-worktree-daemon LaunchAgent (auto worktree on workspace.created)'
    cmds:
      - mkdir -p $HOME/Library/LaunchAgents $HOME/.cache/cmux
      - sed "s|__HOME__|$HOME|g" {{.TASKFILE_DIR}}/templates/launchagents/com.cmux.worktree-daemon.plist > $HOME/Library/LaunchAgents/com.cmux.worktree-daemon.plist
      - launchctl bootout gui/$UID/com.cmux.worktree-daemon 2>/dev/null || true
      - launchctl bootstrap gui/$UID $HOME/Library/LaunchAgents/com.cmux.worktree-daemon.plist
      - echo "✅ cmux-worktree-daemon installed (see ~/.cache/cmux/cmux-worktree-daemon.log)"

  cmux:worktree-daemon:uninstall:
    desc: 'Uninstall cmux-worktree-daemon LaunchAgent'
    cmds:
      - launchctl bootout gui/$UID/com.cmux.worktree-daemon 2>/dev/null || true
      - rm -f $HOME/Library/LaunchAgents/com.cmux.worktree-daemon.plist
      - echo "✅ cmux-worktree-daemon uninstalled"

  nightly:install:
    desc: 'Install/reload all nightly LaunchAgents incl. caffeinate umbrella (夜勤マシン化)'
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/runtime/nightly/launchd-install.sh

  nightly:wake:
    desc: 'Apply scheduled wake for nightly batch via pmset (requires sudo + AC power)'
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/runtime/nightly/setup-nightly-wake.sh apply

  nightly:wake:cancel:
    desc: 'Cancel scheduled wake (pmset repeat cancel, requires sudo)'
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/runtime/nightly/setup-nightly-wake.sh cancel

  nightly:wake:status:
    desc: 'Show scheduled power events (pmset -g sched)'
    cmds:
      - bash {{.TASKFILE_DIR}}/scripts/runtime/nightly/setup-nightly-wake.sh status

  trends:
    desc: 'Show top adopted AI tech trends from adoption-ledger (clickable URLs; DAYS/TOP override 可, 使用は trends-usage.log に記録 — design §9 撤退条件の評価データ)'
    vars:
      DAYS: '{{.DAYS | default "3"}}'
      TOP: '{{.TOP | default "5"}}'
    cmds:
      - mkdir -p $HOME/.cache/tech-researcher
      - date -Iseconds >> $HOME/.cache/tech-researcher/trends-usage.log
      - python3 {{.TASKFILE_DIR}}/scripts/runtime/tech-researcher/trends_select.py $HOME/.cache/tech-researcher/adoption-ledger.jsonl --days "{{.DAYS}}" --top "{{.TOP}}"
