version: "3"

includes:
  osa:
    taskfile: tools/otel-session-analyzer/Taskfile.yml
    dir: tools/otel-session-analyzer

tasks:
  # Phase B2.4 (2026-04-26): symlink タスクは削除。home-manager (nix:switch) が
  # symlink を管理する。詳細は docs/plans/completed/2026-04-25-phase-b2-plan.md。

  install:
    desc: Run initial bootstrap setup (legacy, pre-nix). For nix-managed setup use nix:bootstrap.
    cmds:
      - ~/dotfiles/.bin/init-install.sh

  brew:
    desc: Install packages from Brewfile
    cmds:
      - brew bundle --file=~/dotfiles/Brewfile

  nix:bootstrap:
    desc: 'First-time apply (darwin-rebuild not yet installed). Usage: task nix:bootstrap PROFILE=private'
    vars:
      PROFILE: '{{.PROFILE | default "private"}}'
    cmds:
      # Recent nix-darwin requires root for system activation.
      # HOME fallback warning (/var/root) is benign — nix daemon handles user profile correctly.
      - sudo nix run github:nix-darwin/nix-darwin#darwin-rebuild -- switch --flake ~/dotfiles/nix#{{.PROFILE}}

  nix:switch:
    desc: 'Apply nix-darwin configuration (after bootstrap). Usage: task nix:switch PROFILE=private'
    vars:
      PROFILE: '{{.PROFILE | default "private"}}'
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild switch --flake ~/dotfiles/nix#{{.PROFILE}}

  nix:rollback:
    desc: Roll back to previous nix-darwin generation
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild --rollback

  nix:check:
    desc: Validate nix flake (evaluation + structure)
    cmds:
      - nix flake check ~/dotfiles/nix

  nix:list-generations:
    desc: List nix-darwin generations (for rollback targeting)
    cmds:
      - sudo /run/current-system/sw/bin/darwin-rebuild --list-generations

  nix:explain:
    desc: Dry-run Determinate Systems Installer to preview system changes
    cmds:
      - 'echo "Run this manually (requires sudo): curl -fsSL https://install.determinate.systems/nix | sh -s -- install --explain"'

  nix:snapshot:
    desc: 'Capture /etc/* shell profile snapshot (usage: task nix:snapshot PHASE=pre | task nix:snapshot PHASE=post)'
    vars:
      PHASE: '{{.PHASE | default "pre"}}'
    cmds:
      - ~/dotfiles/nix/scripts/snapshot.sh {{.PHASE}}

  restart-wm:
    desc: Restart window manager services (AeroSpace)
    cmds:
      - ~/dotfiles/.bin/restart-wm.sh

  update:
    desc: Update Homebrew and all packages
    cmds:
      - brew update && brew upgrade && brew cleanup

  build-hooks:
    desc: Build claude-hooks Rust binary
    dir: ~/dotfiles/tools/claude-hooks
    cmds:
      - cargo build --release
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/claude-hooks

  validate:
    desc: Run all dotfiles validation checks
    cmds:
      - task: validate-configs
      - task: validate-readmes
      - task: validate-symlinks

  validate-configs:
    desc: Validate syntax for config and script files
    deps:
      - validate-agents
    cmds:
      - ~/dotfiles/.bin/validate_configs.sh

  validate-agents:
    desc: Validate agent definitions (tools, permissions)
    cmds:
      - bash .config/claude/scripts/policy/validate-agents.sh

  validate-readmes:
    desc: Validate local links in README files
    cmds:
      - ~/dotfiles/.bin/validate_readmes.sh

  validate-symlinks:
    desc: Validate key symlinks managed by dotfiles
    cmds:
      - ~/dotfiles/.bin/validate_symlinks.sh

  upgrade-claude:
    desc: Upgrade Claude Code and apply system prompt patches
    cmds:
      - npm update -g @anthropic-ai/claude-code
      - node ~/dotfiles/tools/system-prompt-patcher/patch-cli.js
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js
    preconditions:
      - test -f ~/dotfiles/tools/system-prompt-patcher/patch-cli.js

  patch-claude:
    desc: Apply system prompt patches without upgrading
    cmds:
      - node ~/dotfiles/tools/system-prompt-patcher/patch-cli.js
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js

  restore-claude:
    desc: Restore Claude Code to vanilla (unpatched) state
    cmds:
      - node ~/dotfiles/tools/system-prompt-patcher/verify-patch.js --restore

  list-claude:
    desc: List installed Claude Code versions and the active one
    cmds:
      - ls -1 ~/.local/share/claude/versions/
      - 'echo "active: $(basename "$(readlink ~/.local/bin/claude 2>/dev/null)")"'

  rollback-claude:
    desc: 'Switch active Claude Code to a specific version (usage: task rollback-claude -- 2.1.101)'
    cmds:
      - 'test -n "{{.CLI_ARGS}}" || (echo "usage: task rollback-claude -- <version>" && exit 1)'
      - 'test -e ~/.local/share/claude/versions/{{.CLI_ARGS}} || (echo "version {{.CLI_ARGS}} not installed under ~/.local/share/claude/versions/" && exit 1)'
      - 'ln -snf ~/.local/share/claude/versions/{{.CLI_ARGS}} ~/.local/bin/claude'
      - '~/.local/bin/claude --version'

  build-claude:
    desc: Build CLAUDE.md from template components
    cmds:
      - bash ~/.claude/scripts/lifecycle/build-claude.sh

  build-claude-check:
    desc: Check if CLAUDE.md matches templates (no write)
    cmds:
      - bash ~/.claude/scripts/lifecycle/build-claude.sh --check

  codex-janitor:
    desc: Run the repo-local Codex janitor workflow runner
    cmds:
      - python3 ~/dotfiles/tools/codex-janitor/runner.py {{.CLI_ARGS}}

  skills:drift-check:
    desc: Detect drift between skills-lock.json provenance and upstream HEAD
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-drift-check.sh {{.CLI_ARGS}}

  skills:verify:
    desc: Verify installed external skills against computedHash in skills-lock.json
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-hash-verify.sh

  skills:rollback:
    desc: 'Roll back skills-lock.json to a previous snapshot (usage: task skills:rollback -- --to=TIMESTAMP)'
    cmds:
      - bash ~/dotfiles/scripts/runtime/skill-rollback.sh {{.CLI_ARGS}}

  skills:install-gh:
    desc: 'Experimental wrapper over `gh skill install` (requires gh CLI v2.90+)'
    cmds:
      - bash ~/dotfiles/scripts/experimental/gh-skill-wrapper.sh install {{.CLI_ARGS}}

  skills:search-gh:
    desc: 'Experimental wrapper over `gh skill search` (requires gh CLI v2.90+)'
    cmds:
      - bash ~/dotfiles/scripts/experimental/gh-skill-wrapper.sh search {{.CLI_ARGS}}
