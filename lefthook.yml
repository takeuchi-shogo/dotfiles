# https://github.com/evilmartians/lefthook
# Pre-commit hooks for polyglot dotfiles repository
# Claude Code hooks (PostToolUse) handle per-edit linting;
# Lefthook handles per-commit batch validation.

pre-commit:
  commands:
    biome-format:
      glob: "*.{ts,tsx,js,jsx,css}"
      run: npx --yes @biomejs/biome@latest format --write {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx --yes oxlint@latest {staged_files}
    ruff-format:
      glob: "*.py"
      run: ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "*.py"
      run: ruff check --fix {staged_files}
      stage_fixed: true
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    check-claudemd-lines:
      glob: "*.md"
      run: bash .config/claude/scripts/policy/check-claudemd-lines.sh
    no-skill-readme:
      # Anthropic 公式 Skills ガイド: skill folder には README.md ではなく SKILL.md を置く
      # README.md は Claude Code の discovery 対象外で agent から見えない
      # 既存 legacy README.md (e.g. vercel-composition-patterns) は別途整理。
      # この hook は新規追加のみ block する。
      glob: ".config/claude/skills/*/README.md"
      run: |
        echo "❌ skill folder に README.md は置かない (SKILL.md を使う): {staged_files}"
        exit 1
    publicity-review:
      # Public-repo leak gate: block high-severity credential leaks in staged content.
      # Reuses scan-jsonl-secrets.py PATTERNS (DRY). Added-lines only (legacy unaffected).
      # Scope: credentials only — 絶対パス/username は accepted-in-repo (script docstring 参照)。
      # Origin: /absorb sonicgarden self-improving-loop (2026-06-05), publicity-review adapted.
      # skip: 誤検知時は `LEFTHOOK_EXCLUDE=publicity-review git commit ...`
      run: python3 scripts/security/publicity-scan.py
    check-new-todo:
      # Section A: Cleanup-Later Boundary (agents/code-reviewer.md より mechanism 化)
      # 新規追加された marker (TODO/FIXME/HACK) には issue 番号 / owner / 期限のいずれかが必須
      # 既存 marker は対象外 (git diff --cached の + 行のみ検査)
      # 検出対象: `<MARKER>` 直後にコロンまたは開き括弧が続くもの (自然言語中の単語は除外)
      # 許可形式: TODO(#1234) / FIXME(@owner) / HACK(2026-06-30) — qualifier 必須
      # skip: 一時的に skip するなら `LEFTHOOK_EXCLUDE=check-new-todo git commit ...`
      run: |
        NEW_BARE=$(git diff --cached --diff-filter=AM -U0 \
          | grep -E '^[+]' \
          | grep -vE '^[+][+][+]' \
          | grep -E '(TODO|FIXME|HACK)[:(]' \
          | grep -vE '(TODO|FIXME|HACK)\((#[0-9]+|@[a-zA-Z0-9_-]+|[0-9]{4}-[0-9]{2}-[0-9]{2})\)' \
          || true)
        if [ -n "$NEW_BARE" ]; then
          echo "❌ 新規 TODO/FIXME/HACK には issue 番号 / owner / 期限のいずれかが必要:"
          echo "$NEW_BARE" | sed 's/^+//' | head -10
          echo ""
          echo "   許可形式: TODO(#1234) / FIXME(@owner) / HACK(2026-06-30)"
          echo "   根拠: .config/claude/agents/code-reviewer.md Section A (Cleanup-Later Boundary)"
          exit 1
        fi

commit-msg:
  commands:
    conventional-commit:
      # 許可絵文字: gitmoji 公式 + /commit skill の絵文字表に揃える
      # ✨ feat / 🐛 fix / 📝 docs / ♻️ refactor / 🔧 chore / 🚀 ci / ⬆️ deps
      # 🔒 security / ✅ test / 🏗️ build / 🗑️ remove / 🎨 style / ⚡ perf
      # 🔥 fix(削除) / 💥 feat(破壊的) / 🚑 fix(critical) / 💄 style(UI) / 🏷️ feat(types)
      run: |
        MSG=$(head -1 {1})
        if ! echo "$MSG" | grep -qE '^(✨|🐛|📝|♻️|🔧|🚀|⬆️|🔒|✅|🏗️|🗑️|🎨|⚡|🔥|💥|🚑|💄|🏷️) (feat|fix|docs|refactor|chore|ci|perf|security|test|build|revert|style|perf)(\(.+\))?: .+'; then
          echo "❌ Commit message must follow: <emoji> <type>(<scope>): <description>"
          echo "   Example: ✨ feat: add new feature"
          echo "   許可絵文字: ✨ 🐛 📝 ♻️ 🔧 🚀 ⬆️ 🔒 ✅ 🏗️ 🗑️ 🎨 ⚡ 🔥 💥 🚑 💄 🏷️"
          exit 1
        fi
