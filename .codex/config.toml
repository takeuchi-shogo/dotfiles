model = "gpt-5.6-sol"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "detailed"
review_model = "gpt-5.6-terra"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# 通常タスクは high、UI 実装は medium (profiles.frontend)、レビュー時は必ず xhigh (profiles.review) を使用する
# model_reasoning_summary = "detailed" で推論過程の可視性を向上
# personality は persistent default だけに使う。出力形式や長さは task / skill 側で制御する
# approval_policy = "on-request" と sandbox_mode = "workspace-write" を既定にして
# 低摩擦に編集できる状態を保ちつつ、危険な操作は都度確認する

notify = ["/Users/shogo_takeuchi/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[profiles.fast]
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"

[profiles.frontend]
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"

[profiles.review]
# Token strip: review profile は read-only sandbox。GITHUB_TOKEN/LINEAR_API_KEY を
# 物理的に unset する場合は wrapper script を介する（実装は別タスク）
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
sandbox_mode = "read-only"

[profiles.research]
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
sandbox_mode = "read-only"
web_search = "live"

[profiles.security]
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
sandbox_mode = "read-only"

[profiles.resume]
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
sandbox_mode = "workspace-write"

[features]
hooks = true                  # hooks framework (stable since v0.124.0). 必須: false/未設定だと hooks がサイレントに無視される
memories = true               # Codex memories を明示有効化。Chronicle は Codex app 側で opt-in
shell_snapshot = true        # 環境スナップショット（beta）
undo = true                  # per-turn git ghost snapshots を有効化
apply_patch_freeform = true  # freeform パッチ適用（experimental）
js_repl = false

# === Hooks pilot ===
# 公式: https://developers.openai.com/codex/hooks
# 既知バグ #19199: v0.124.0 でクラッシュ報告あり → 二層構造で厳密に守る
# rollback: 起動失敗時は codex_hooks = false に変更
[[hooks.PostToolUse]]
matcher = "apply_patch"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "echo '[codex hook pilot] apply_patch completed; consider running lint/test'"
timeout = 5
statusMessage = "Pilot hook firing"

