model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "detailed"
review_model = "gpt-5.4"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# 通常タスクは high、UI 実装は medium (profiles.frontend)、レビュー時は必ず xhigh (profiles.review) を使用する
# model_reasoning_summary = "detailed" で推論過程の可視性を向上
# personality は persistent default だけに使う。出力形式や長さは task / skill 側で制御する
# approval_policy = "on-request" と sandbox_mode = "workspace-write" を既定にして
# 低摩擦に編集できる状態を保ちつつ、危険な操作は都度確認する

[profiles.fast]
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"

[profiles.frontend]
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"

[profiles.review]
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
sandbox_mode = "read-only"

[profiles.research]
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
sandbox_mode = "read-only"
web_search = "live"

[profiles.security]
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
sandbox_mode = "read-only"

[profiles.resume]
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
sandbox_mode = "workspace-write"

[features]
memories = true               # Codex memories を明示有効化。Chronicle は Codex app 側で opt-in
shell_snapshot = true        # 環境スナップショット（beta）
undo = true                  # per-turn git ghost snapshots を有効化
apply_patch_freeform = true  # freeform パッチ適用（experimental）

[memories]
use_memories = true
generate_memories = true
no_memories_if_mcp_or_web_search = true
consolidation_model = "gpt-5.4-mini"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.deepwiki]
command = "npx"
args = ["-y", "@anthropic-ai/deepwiki-mcp@latest"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[notifications]
command = "osascript -e 'display notification \"Codex が完了しました\" with title \"Codex CLI\"'"
# agent-turn-complete イベントで macOS 通知（Claude Code hooks と統一）

[analytics]
enabled = false  # 匿名テレメトリ無効化

[projects."/Users/takeuchishougo/dotfiles"]
trust_level = "trusted"

[projects."/Users/shogo_takeuchi/projects/knowledge-work/knowledgework"]
trust_level = "trusted"

[projects."/Users/takeuchishougo/dev-app/hearable/app"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[agents]
max_threads = 4  # 公式例は 6 だが保守的に開始。token 消費を見て増やす
max_depth = 1    # subagent の subagent は禁止。orchestration コスト増を防ぐ

[plugins."github@openai-curated"]
enabled = true
