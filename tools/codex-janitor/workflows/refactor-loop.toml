name = "refactor-loop"
description = "Plan-first refactor loop for Codex using repo-local skills"

[prompt]
required = false
default = "$find-best-refactor find the single highest-leverage refactor in this repository"
user_template = "$find-best-refactor {user_prompt}"

[counts]
improvements = 4
reviews = 5

[stopping]
usefulness_threshold = 3

[stop_rules.no_op_diff]
enabled = true

[stop_rules.validation]
enabled = false
command = "task validate-configs"
timeout = 300

[stop_rules.time_budget]
enabled = true
seconds = 1800

[stop_rules.snapshot_drift]
enabled = true
apply_labels = ["implement"]

[stop_rules.destructive_without_evidence]
enabled = true
deletion_threshold = 50
total_threshold = 100
usefulness_floor = 5

[[stages]]
label = "find-best-refactor"
prompt = "{initial_prompt}"

[[stages]]
label = "execplan-improve"
prompt = "$execplan-improve improve the pending execution plan at .agent/execplan-pending.md"
repeat = "improvements"
stop_on_skip = true
stop_on_low_usefulness = true

[[stages]]
label = "implement-execplan"
prompt = "$implement-execplan implement the pending execution plan at .agent/execplan-pending.md"

[[stages]]
label = "review-recent-work"
prompt = "$review-recent-work review the most recently implemented ExecPlan work"
repeat = "reviews"
stop_on_skip = true
stop_on_low_usefulness = true
