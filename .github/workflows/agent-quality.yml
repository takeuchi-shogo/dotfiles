# Background Agent: Continuous Quality
# Proposes fix PRs when CI fails
# KEEP IN SYNC: workflows: ["CI"] must match the CI workflow's name field
name: "Agent: Quality Fix"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed workflow run ID to fix"
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: quality-fix
  cancel-in-progress: true

jobs:
  quality-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine run ID
        id: run
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
          EVENT_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            [[ "$INPUT_RUN_ID" =~ ^[0-9]+$ ]] || { echo "::error::Invalid run ID"; exit 1; }
            echo "id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
          else
            echo "id=$EVENT_RUN_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch failure logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.run.outputs.id }}
        run: |
          gh run view "$RUN_ID" --log-failed > /tmp/ci-failure.log 2>/tmp/ci-failure-stderr.log
          if [[ ! -s /tmp/ci-failure.log ]]; then
            echo "::error::No failure logs found for run $RUN_ID"
            exit 1
          fi
          tail -200 /tmp/ci-failure.log > /tmp/ci-failure-trimmed.log

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Attempt fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          [[ -z "$ANTHROPIC_API_KEY" ]] && { echo "::error::ANTHROPIC_API_KEY is not set"; exit 1; }
          cat .github/agent-config/quality-fix.md > /tmp/prompt.txt
          printf '\n\nCI failure log:\n' >> /tmp/prompt.txt
          cat /tmp/ci-failure-trimmed.log >> /tmp/prompt.txt
          claude -p "$(cat /tmp/prompt.txt)" \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(task lint *),Bash(task test *),Bash(npm run *),Bash(go build *),Bash(go test *),Bash(go vet *),Bash(biome *)" \
            --max-cost 5.00

      - name: Create PR if fixes applied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.run.outputs.id }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            BRANCH="agent/quality-fix-${RUN_ID}"
            git checkout -b "$BRANCH"
            git add -A -- ':!.github/' ':!.claude/' ':!*.env*' ':!*.key' ':!*.pem'
            git commit -m "$(cat <<'EOF'
          🐛 fix: auto-fix CI failure (automated)
          EOF
          )" && git push origin "$BRANCH" && gh pr create \
              --title "🐛 Auto-fix CI failure (run #${RUN_ID})" \
              --body "$(cat <<'EOF'
          ## Summary
          - Automated fix for CI failure
          - Generated by background quality agent

          ## Review Required
          This PR was created automatically. Please review carefully before merging.
          EOF
          )" \
              --reviewer "${{ github.repository_owner }}"
          fi
