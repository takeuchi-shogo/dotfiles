format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$time\
$line_break\
$status\
$character"""

add_newline = true
palette = 'solarized_osaka'

[directory]
style = 'bold fg:sapphire'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'έΑο/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '≤░Ιβ'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = "Όεξ "
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style))'
modified = '[≤░╖Κ ${count}](orange) '
untracked = '[≤▒ςζ ${count}](blue) '
staged = '[≤░Ευ ${count}](green) '
deleted = '[≤░δΝ ${count}](red) '
renamed = '[≤░Η┤ ${count}](purple) '
stashed = '[≤░ΠΩ ${count}](yellow) '
ahead = '[≤░Βη ${count}](green) '
behind = '[≤░ΒΗ ${count}](red) '
diverged = '[≤░Βη ${ahead_count} ≤░ΒΗ ${behind_count}](yellow) '

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = 'green'
deleted_style = 'red'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = "Όε╝ "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = "Όαι "
format = '[$symbol($version )]($style)'

[nodejs]
style = 'blue'
symbol = "Όεα "
format = '[$symbol($version )]($style)'

[golang]
style = 'blue'
symbol = "Όαο "
format = '[$symbol($version )]($style)'

[haskell]
style = 'blue'
symbol = "Όζ╖ "
format = '[$symbol($version )]($style)'

[rust]
style = 'orange'
symbol = "Όηρ "
format = '[$symbol($version )]($style)'

[ruby]
style = 'blue'
symbol = "ΌηΣ "
format = '[$symbol($version )]($style)'

[package]
symbol = '≤░ΠΩ '

[aws]
symbol = "Όηφ "
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = "ΎΝΙ "
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = "ΎΑΥ "
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 0
show_milliseconds = true
style = 'fg:green'
format = '[≤▒Οτ $duration]($style) '

[time]
disabled = false
time_format = '%T'
style = 'fg:purple'
format = '[≤░ξΦ $time]($style)'

[status]
disabled = false
style = 'fg:green'
success_symbol = '[≤░Ευ](fg:green)'
symbol = '[≤░ΖΨ $status](bold fg:red)'
format = '$symbol '

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

