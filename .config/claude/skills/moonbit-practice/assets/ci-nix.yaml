# Github Actions CI with Nix (moonbit-overlay)
# Uses moonbit-community/moonbit-overlay for reproducible MoonBit builds
name: CI (Nix)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Check
        run: nix develop --command moon check --deny-warn
      - name: Test
        run: nix develop --command moon test
