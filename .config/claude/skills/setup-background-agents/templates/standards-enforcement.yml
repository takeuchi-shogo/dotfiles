# Background Agent: Standards Enforcement
# Generated by /setup-background-agents skill
name: "Agent: Standards Enforcement"

on:
  schedule:
    - cron: "0 4 * * 1" # Weekly Monday 4:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target directory or pattern"
        default: "src/"

permissions:
  contents: write
  pull-requests: write

jobs:
  enforce-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply coding standards
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/agent-config/standards-enforcement.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-cost 5.00

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            BRANCH="agent/standards-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "$(cat <<'EOF'
          ♻️ refactor: enforce coding standards (automated)
          EOF
          )"
            git push origin "$BRANCH"
            gh pr create \
              --title "♻️ Standards enforcement $(date +%Y-%m-%d)" \
              --body "Automated standards enforcement by background agent." \
              --reviewer "${{ github.repository_owner }}"
          fi
