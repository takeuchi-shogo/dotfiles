# Background Agent: Dependency Audit
# Generated by /setup-background-agents skill
name: "Agent: Dependency Audit"

on:
  schedule:
    - cron: "0 3 * * 1" # Weekly Monday 3:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: "Scope: all, security-only, major-only"
        default: "all"

permissions:
  contents: write
  pull-requests: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run dependency audit agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/agent-config/dependency-audit.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-cost 5.00

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            BRANCH="agent/dependency-audit-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "$(cat <<'EOF'
          🔧 chore: update dependencies (automated audit)
          EOF
          )"
            git push origin "$BRANCH"
            gh pr create \
              --title "🔧 Dependency audit $(date +%Y-%m-%d)" \
              --body "Automated dependency audit by background agent." \
              --reviewer "${{ github.repository_owner }}"
          fi
