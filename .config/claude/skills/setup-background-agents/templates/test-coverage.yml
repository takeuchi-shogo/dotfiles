# Background Agent: Test Coverage Expansion
# Generated by /setup-background-agents skill
name: "Agent: Test Coverage"

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  coverage-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze and expand coverage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          claude -p "$(cat .github/agent-config/test-coverage.md)

          Changed files in this PR:
          ${CHANGED}" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --max-cost 5.00

      - name: Push test additions
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add -A
            git commit -m "$(cat <<'EOF'
          ✅ test: expand test coverage for changed files
          EOF
          )"
            git push
          fi
