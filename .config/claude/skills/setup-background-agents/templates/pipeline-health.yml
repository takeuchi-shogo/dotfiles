# Background Agent: Pipeline Health Monitor
# Generated by /setup-background-agents skill
# Ref: Aicon "Issue から AI が動き、人間の役割は要件定義だけになった" (2026-04-02)
# Pattern: 停滞監視 + CI 自動修正 + コンフリクト解消
name: "Agent: Pipeline Health"

on:
  schedule:
    - cron: "0 */4 * * *" # Every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Job 1: 停滞 PR/Issue の検出と自動回復
  stuck-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Detect stuck PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Stuck PRs (no activity > 24h with agent labels)" > /tmp/stuck.md

          gh pr list --state open --json number,title,updatedAt,labels \
            --jq '.[] | select(
              (.labels | map(.name) | any(startswith("agent"))) and
              (now - (.updatedAt | fromdateiso8601) > 86400)
            ) | "- #\(.number) \(.title) (last: \(.updatedAt))"' \
            >> /tmp/stuck.md

          if [ -s /tmp/stuck.md ] && [ "$(wc -l < /tmp/stuck.md)" -gt 1 ]; then
            echo "Found stuck PRs"
            cat /tmp/stuck.md
          else
            echo "No stuck PRs found"
          fi

      - name: Attempt recovery for stuck PRs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,labels,updatedAt \
            --jq '.[] | select(
              (.labels | map(.name) | any(startswith("agent"))) and
              (now - (.updatedAt | fromdateiso8601) > 86400)
            ) | .number' | head -3 | while read -r pr_num; do
            gh pr comment "$pr_num" \
              --body "⚠️ このPRは24時間以上停滞しています。状態を確認してください。"
          done

  # Job 1.5: ブロッカー解消時の後続タスク自動起動
  # Ref: Aicon auto-label-on-unblock パターン
  unblock-relay:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check recently closed blocker issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直近4時間以内にクローズされた Issue を取得
          SINCE=$(date -u -d '4 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-4H '+%Y-%m-%dT%H:%M:%SZ')

          gh issue list --state closed --json number,closedAt,title \
            --jq ".[] | select(.closedAt > \"$SINCE\") | .number" \
            | while read -r closed_num; do

            # この Issue をブロッカーとして参照している Issue を検索
            gh api "repos/${{ github.repository }}/issues/$closed_num/timeline" \
              --jq '.[] | select(.event == "cross-referenced") | .source.issue.number' \
              2>/dev/null | sort -u | while read -r dep_num; do

              # 依存先 Issue がまだ open で、他にブロッカーが残っていないか確認
              STATE=$(gh issue view "$dep_num" --json state -q '.state' 2>/dev/null)
              if [ "$STATE" = "OPEN" ]; then
                echo "✅ Issue #$closed_num closed → unblocking #$dep_num"
                gh issue comment "$dep_num" \
                  --body "🔓 ブロッカー #$closed_num が解消されました。作業を再開できます。"
              fi
            done
          done

  # Job 2: CI 失敗 PR の自動修正試行
  fix-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Find and fix CI failures
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,statusCheckRollup \
            --jq '.[] | select(.statusCheckRollup | any(.status == "FAILURE")) | .number' \
            | head -2 | while read -r pr_num; do

            echo "Attempting to fix CI for PR #$pr_num"
            BRANCH=$(gh pr view "$pr_num" --json headRefName -q '.headRefName')
            git checkout "$BRANCH" 2>/dev/null || continue

            # Get CI failure logs
            LOGS=$(gh pr checks "$pr_num" --json name,state,output \
              --jq '.[] | select(.state == "FAILURE") | "\(.name): \(.output)"' | head -100)

            claude -p "$(cat <<PROMPT
          以下の CI 失敗ログを分析し、修正してください。
          修正は最小限に留め、テストが通ることを確認してください。

          ## CI 失敗ログ
          $LOGS
          PROMPT
            )" --allowedTools "Read,Write,Edit,Bash,Glob,Grep" --max-cost 3.00

            if [[ -n $(git status --porcelain) ]]; then
              git add -A
              git commit -m "🐛 fix: auto-fix CI failures for PR #$pr_num"
              git push origin "$BRANCH"
            fi
          done

  # Job 3: コンフリクト検出と自動解消
  fix-conflicts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect and resolve conflicts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"

          gh pr list --state open --json number,mergeable,headRefName \
            --jq '.[] | select(.mergeable == "CONFLICTING") | "\(.number) \(.headRefName)"' \
            | head -2 | while read -r pr_num branch; do

            echo "Resolving conflicts for PR #$pr_num ($branch)"
            git checkout "$branch" 2>/dev/null || continue
            git merge "$BASE_BRANCH" --no-commit 2>/dev/null || true

            # Get conflicted files
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -z "$CONFLICTS" ]; then
              continue
            fi

            claude -p "$(cat <<PROMPT
          以下のファイルでマージコンフリクトが発生しています。
          コンフリクトマーカー (<<<<<<< ======= >>>>>>>) を解消してください。
          両方の変更の意図を理解し、適切にマージしてください。

          ## コンフリクトファイル
          $CONFLICTS
          PROMPT
            )" --allowedTools "Read,Write,Edit,Bash" --max-cost 2.00

            if [[ -z $(git diff --name-only --diff-filter=U) ]]; then
              git add -A
              git commit -m "🔀 fix: resolve merge conflicts for PR #$pr_num"
              git push origin "$branch"
              gh pr comment "$pr_num" --body "✅ マージコンフリクトを自動解消しました。"
            fi
          done
