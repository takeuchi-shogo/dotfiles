# Background Agent: Design Pipeline (Label-driven)
# Generated by /setup-background-agents skill
# Ref: Aicon "Issue から AI が動き、人間の役割は要件定義だけになった" (2026-04-02)
# Pattern: ラベル駆動 Agent バトンリレー — 要件定義→設計→タスク分割
name: "Agent: Design Pipeline"

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Phase 1: 要件定義の壁打ち
  requirements:
    if: contains(github.event.label.name, 'needs-requirements')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Interview for requirements
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q '.body')
          QUESTIONS=$(claude -p "$(cat <<PROMPT
          以下の Issue を分析し、実装に必要な質問を 3-5 個生成してください。
          各質問は具体的で、回答によって設計が変わるものに絞ってください。

          ## Issue
          $ISSUE_BODY

          ## 出力形式
          質問をマークダウンのチェックリスト形式で出力してください。
          PROMPT
          )" --max-cost 1.00)
          gh issue comment ${{ github.event.issue.number }} \
            --body "$(cat <<EOF
          ## 🤖 要件確認の質問

          $QUESTIONS

          ---
          回答後、\`requirements-done\` ラベルを付けてください。
          EOF
          )"

  # Phase 2: 設計書作成
  detailed-design:
    if: contains(github.event.label.name, 'requirements-done')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate design document
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_CONTENT=$(gh issue view ${{ github.event.issue.number }} --json body,comments -q '[.body, (.comments[].body)] | join("\n---\n")')
          claude -p "$(cat <<PROMPT
          以下の Issue とコメントから設計書を作成してください。

          ## Issue + コメント
          $ISSUE_CONTENT

          ## 出力
          1. 変更対象ファイル一覧
          2. 各ファイルの変更概要
          3. PR 分割計画（1PR あたりの変更が小さくなるよう分割）
          4. テスト計画

          マークダウン形式で出力してください。
          PROMPT
          )" --max-cost 2.00 > /tmp/design.md
          gh issue comment ${{ github.event.issue.number }} \
            --body "$(cat <<EOF
          ## 📐 設計書

          $(cat /tmp/design.md)

          ---
          設計に問題なければ \`design-done\` ラベルを付けてください。
          EOF
          )"

  # Phase 3: サブタスク自動生成
  task-split:
    if: contains(github.event.label.name, 'design-done')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Split into sub-issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_CONTENT=$(gh issue view ${{ github.event.issue.number }} --json body,comments -q '[.body, (.comments[].body)] | join("\n---\n")')
          claude -p "$(cat <<PROMPT
          以下の設計書からサブタスクを生成してください。各タスクは:
          - 1PR で完結する粒度
          - 依存関係を明示（blocked-by: #N）
          - 受入基準を含む

          JSON 配列で出力:
          [{"title": "...", "body": "...", "depends_on": []}]

          ## 設計書
          $ISSUE_CONTENT
          PROMPT
          )" --output-format json --max-cost 1.00 > /tmp/tasks.json

          jq -c '.[]' /tmp/tasks.json | while read -r task; do
            TITLE=$(echo "$task" | jq -r '.title')
            BODY=$(echo "$task" | jq -r '.body')
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "ready-to-implement" \
              --milestone "${{ github.event.issue.milestone.title }}"
          done

          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ サブタスクを生成しました。各サブ Issue に \`ready-to-implement\` ラベルが付いています。"
