# Background Agent: Periodic Scoring Audit
# Generated by /setup-background-agents skill
# Ref: Aicon "Issue から AI が動き、人間の役割は要件定義だけになった" (2026-04-02)
name: "Agent: Scoring Audit"

on:
  schedule:
    - cron: "0 2 * * 1" # Weekly Monday 2:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target directory or pattern"
        default: "src/"

permissions:
  contents: read
  issues: write

jobs:
  scoring-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect quantitative metrics
        id: metrics
        run: |
          TARGET="${{ inputs.target || 'src/' }}"
          echo "## Workflow Health Metrics" > /tmp/metrics.md

          # Complexity: LOC + branch points + external calls
          LOC=$(find "$TARGET" -type f \( -name '*.go' -o -name '*.ts' -o -name '*.py' \) -exec cat {} + 2>/dev/null | wc -l)
          BRANCHES=$(grep -rn 'if \|switch \|case \|select {' "$TARGET" --include='*.go' --include='*.ts' --include='*.py' 2>/dev/null | wc -l)
          EXT_CALLS=$(grep -rn 'http\.\|fetch(\|axios\.\|grpc\.' "$TARGET" --include='*.go' --include='*.ts' --include='*.py' 2>/dev/null | wc -l)

          LOC_SCORE=$(python3 -c "print(min($LOC, 50000) / 50000 * 15)")
          BRANCH_SCORE=$(python3 -c "print(min($BRANCHES, 2500) / 2500 * 20)")
          EXT_SCORE=$(python3 -c "print(min($EXT_CALLS, 400) / 400 * 20)")
          COMPLEXITY=$(python3 -c "print(round($LOC_SCORE + $BRANCH_SCORE + $EXT_SCORE, 1))")

          # Stability: CI success rate from recent runs
          TOTAL_RUNS=$(gh run list --limit 20 --json conclusion -q 'length')
          SUCCESS_RUNS=$(gh run list --limit 20 --json conclusion -q '[.[] | select(.conclusion == "success")] | length')
          SUCCESS_RATE=$(python3 -c "print(round($SUCCESS_RUNS / max($TOTAL_RUNS, 1) * 100, 1))")
          STABILITY=$(python3 -c "print(round($SUCCESS_RATE * 0.45 + 50 * 0.55, 1))")

          # Priority: complexity * (100 - stability) / 100
          PRIORITY=$(python3 -c "print(round($COMPLEXITY * (100 - $STABILITY) / 100, 1))")

          echo "complexity=$COMPLEXITY" >> "$GITHUB_OUTPUT"
          echo "stability=$STABILITY" >> "$GITHUB_OUTPUT"
          echo "priority=$PRIORITY" >> "$GITHUB_OUTPUT"

          cat >> /tmp/metrics.md <<EOF
          | Metric | Value |
          |--------|-------|
          | LOC | $LOC |
          | Branch points | $BRANCHES |
          | External calls | $EXT_CALLS |
          | Complexity score | $COMPLEXITY / 55 |
          | CI success rate | $SUCCESS_RATE% |
          | Stability score | $STABILITY / 100 |
          | **Priority score** | **$PRIORITY** |
          EOF

      - name: Run 6-aspect scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat <<'PROMPT'
          コードベースの ${{ inputs.target || 'src/' }} を以下の6観点で 1-10 のスコアで評価してください:
          1. アーキテクチャ（モジュール分離、依存関係の健全性）
          2. コード品質（可読性、命名、複雑度）
          3. テスト（カバレッジ、テスト設計の質）
          4. セキュリティ（OWASP Top 10、認証・認可）
          5. パフォーマンス（N+1、メモリリーク、不要な処理）
          6. 運用性（ログ、監視、エラーハンドリング）

          スコアが 5 以下の箇所について、以下の JSON 形式で出力してください:
          {
            "summary": { "architecture": N, "quality": N, "test": N, "security": N, "performance": N, "operations": N },
            "findings": [
              {
                "category": "カテゴリ名",
                "score": N,
                "title": "Issue タイトル",
                "body": "## 問題\n...\n## 改善提案\n...\n## 対象ファイル\n- file:line",
                "severity": "high|medium|low"
              }
            ]
          }
          PROMPT
          )" --output-format json --max-cost 3.00 > /tmp/scores.json

      - name: Create issues for low scores
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f /tmp/scores.json ]; then
            echo "No scores generated"
            exit 0
          fi
          jq -c '.findings[] | select(.score <= 5)' /tmp/scores.json 2>/dev/null | head -5 | while read -r finding; do
            TITLE=$(echo "$finding" | jq -r '"🔍 [Auto-Audit] " + .title')
            BODY=$(echo "$finding" | jq -r '.body')
            CATEGORY=$(echo "$finding" | jq -r '.category')
            SEVERITY=$(echo "$finding" | jq -r '.severity')
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "auto-audit,$CATEGORY,$SEVERITY"
          done
