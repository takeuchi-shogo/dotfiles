# Background Agent: Periodic Scoring Audit
# Generated by /setup-background-agents skill
# Ref: Aicon "Issue から AI が動き、人間の役割は要件定義だけになった" (2026-04-02)
name: "Agent: Scoring Audit"

on:
  schedule:
    - cron: "0 2 * * 1" # Weekly Monday 2:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Target directory or pattern"
        default: "src/"

permissions:
  contents: read
  issues: write

jobs:
  scoring-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run 6-aspect scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat <<'PROMPT'
          コードベースの ${{ inputs.target || 'src/' }} を以下の6観点で 1-10 のスコアで評価してください:
          1. アーキテクチャ（モジュール分離、依存関係の健全性）
          2. コード品質（可読性、命名、複雑度）
          3. テスト（カバレッジ、テスト設計の質）
          4. セキュリティ（OWASP Top 10、認証・認可）
          5. パフォーマンス（N+1、メモリリーク、不要な処理）
          6. 運用性（ログ、監視、エラーハンドリング）

          スコアが 5 以下の箇所について、以下の JSON 形式で出力してください:
          {
            "summary": { "architecture": N, "quality": N, "test": N, "security": N, "performance": N, "operations": N },
            "findings": [
              {
                "category": "カテゴリ名",
                "score": N,
                "title": "Issue タイトル",
                "body": "## 問題\n...\n## 改善提案\n...\n## 対象ファイル\n- file:line",
                "severity": "high|medium|low"
              }
            ]
          }
          PROMPT
          )" --output-format json --max-cost 3.00 > /tmp/scores.json

      - name: Create issues for low scores
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f /tmp/scores.json ]; then
            echo "No scores generated"
            exit 0
          fi
          jq -c '.findings[] | select(.score <= 5)' /tmp/scores.json 2>/dev/null | head -5 | while read -r finding; do
            TITLE=$(echo "$finding" | jq -r '"🔍 [Auto-Audit] " + .title')
            BODY=$(echo "$finding" | jq -r '.body')
            CATEGORY=$(echo "$finding" | jq -r '.category')
            SEVERITY=$(echo "$finding" | jq -r '.severity')
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "auto-audit,$CATEGORY,$SEVERITY"
          done
