interface:
  display_name: "Explain Code"
  short_description: "Explain code as a scannable blog post"
  default_prompt: "Use $explain-code. # Title, then a tldr: 2–3 short sentences, plain language—one idea per sentence, no jargon gumbo, lead with the simple story. No ornamental symbols in # title or tldr. Then ## sections: each ## title is plain English (short, scannable). Every ## must include at least one fenced code snippet with comments; no prose-only sections. If an idea is thin, use the smallest real excerpt from the code in scope or merge ideas so the section still has a snippet. Each section: 1–2 simple lead-in sentences, snippet(s), at most 1–2 short follow-up sentences. Match the user’s ask and scope; do not follow a fixed catalog of “kinds” of tasks. Scannable, do not overwhelm. User’s scope, or if none, unstaged diff. Do not invent intent beyond the code and prompt."
policy:
  allow_implicit_invocation: false
